<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AV4X04 — Secure Access</title>
    <meta name="description" content="AV4X04 Monitor — Secure admin login portal with real-time API monitoring." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg: #0b0f19;
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.35);
            --primary-soft: rgba(0, 242, 255, 0.08);
            --accent: #7000ff;
            --text: #e8eaf6;
            --text-muted: #7b8db0;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --success: #00ff9d;
            --error: #ff2d55;
            --warning: #ff9d00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── CANVAS ── */
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(0, 40, 60, 0.45) 0%, var(--bg) 70%);
            pointer-events: none;
        }

        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px);
            pointer-events: none;
        }

        /* ── WRAPPER ── */
        .wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            gap: 0.9rem;
        }

        /* ── HERO ICON ── */
        .hero-icon {
            position: relative;
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.3rem;
        }

        .hero-icon-ring {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 1.5px solid rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(8px);
            animation: orbit-pulse 3s ease-in-out infinite;
            box-shadow: 0 0 24px rgba(0, 242, 255, 0.15), inset 0 0 16px rgba(0, 242, 255, 0.05);
        }

        @keyframes orbit-pulse {

            0%,
            100% {
                box-shadow: 0 0 24px rgba(0, 242, 255, 0.15), inset 0 0 16px rgba(0, 242, 255, 0.05);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 0 40px rgba(0, 242, 255, 0.3), inset 0 0 24px rgba(0, 242, 255, 0.1);
                transform: scale(1.04);
            }
        }

        .hero-icon-core {
            display: block;
        }

        /* ── NODE ICON ANIMATION ── */
        @keyframes node-blink {

            0%,
            100% {
                opacity: 0.9;
            }

            50% {
                opacity: 0.4;
            }
        }

        .node-blink-1 {
            animation: node-blink 2.1s ease-in-out infinite;
        }

        .node-blink-2 {
            animation: node-blink 2.8s ease-in-out infinite 0.4s;
        }

        .node-blink-3 {
            animation: node-blink 1.9s ease-in-out infinite 0.8s;
        }

        .node-blink-4 {
            animation: node-blink 2.5s ease-in-out infinite 1.1s;
        }

        /* ── BRAND ── */
        .brand-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 60%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            font-family: 'JetBrains Mono', monospace;
            margin-top: -0.2rem;
        }

        /* ── CARD ── */
        .card {
            background: rgba(14, 20, 34, 0.75);
            border: 1px solid rgba(0, 242, 255, 0.12);
            border-radius: 1.25rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 242, 255, 0.05);
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        /* ── FORM FIELDS ── */
        .field {
            margin-bottom: 1.25rem;
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .field-label i {
            font-size: 0.9rem;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.5rem;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.25s;
        }

        .input-wrap input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 242, 255, 0.12);
            background: rgba(0, 242, 255, 0.04);
        }

        .input-wrap input::placeholder {
            color: var(--text-muted);
        }

        .input-icon {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap:focus-within .input-icon {
            color: var(--primary);
        }

        .toggle-pw {
            position: absolute;
            right: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1rem;
            transition: color 0.2s;
            padding: 2px;
        }

        .toggle-pw:hover {
            color: var(--primary);
        }

        /* ── SUBMIT ── */
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--primary), #00a8ff);
            border: none;
            border-radius: 0.75rem;
            color: #000;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--primary-glow);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ── ERROR ── */
        .error-msg {
            display: none;
            align-items: center;
            gap: 6px;
            margin-top: 0.9rem;
            padding: 0.7rem 1rem;
            background: rgba(255, 45, 85, 0.08);
            border: 1px solid rgba(255, 45, 85, 0.25);
            border-radius: 0.65rem;
            font-size: 0.8rem;
            color: var(--error);
        }

        .error-msg.show {
            display: flex;
        }

        /* ── STATS BAR ── */
        .hero-stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid var(--card-border);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .stat-item i {
            color: var(--primary);
            font-size: 0.85rem;
        }

        .stat-divider {
            width: 1px;
            height: 12px;
            background: var(--card-border);
        }

        /* ── FOOTER ── */
        .card-footer {
            font-size: 0.65rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            letter-spacing: 2px;
            opacity: 0.5;
            text-align: center;
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>
    <div class="bg-overlay"></div>
    <div class="scanlines"></div>

    <div class="wrapper">
        <!-- Hero icon: custom network-node SVG with blinking satellites -->
        <div class="hero-icon">
            <div class="hero-icon-ring">
                <svg class="hero-icon-core" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg"
                    style="width:32px;height:32px">
                    <!-- Center core -->
                    <circle cx="20" cy="20" r="4.5" fill="#00f2ff" opacity="0.95" />
                    <circle cx="20" cy="20" r="8" fill="none" stroke="#00f2ff" stroke-width="0.8" opacity="0.3" />
                    <!-- Top node -->
                    <circle cx="20" cy="7" r="2.5" fill="#00f2ff" class="node-blink-1" />
                    <line x1="20" y1="11.5" x2="20" y2="9.5" stroke="#00f2ff" stroke-width="1" opacity="0.6" />
                    <!-- Bottom node -->
                    <circle cx="20" cy="33" r="2.5" fill="#00f2ff" class="node-blink-2" />
                    <line x1="20" y1="28.5" x2="20" y2="30.5" stroke="#00f2ff" stroke-width="1" opacity="0.6" />
                    <!-- Left node -->
                    <circle cx="7" cy="20" r="2.5" fill="#00f2ff" class="node-blink-3" />
                    <line x1="11.5" y1="20" x2="9.5" y2="20" stroke="#00f2ff" stroke-width="1" opacity="0.6" />
                    <!-- Right node -->
                    <circle cx="33" cy="20" r="2.5" fill="#00f2ff" class="node-blink-4" />
                    <line x1="28.5" y1="20" x2="30.5" y2="20" stroke="#00f2ff" stroke-width="1" opacity="0.6" />
                    <!-- Diagonal accent nodes (purple) -->
                    <circle cx="30" cy="10" r="2" fill="#7000ff" opacity="0.8" class="node-blink-2" />
                    <circle cx="10" cy="30" r="2" fill="#7000ff" opacity="0.8" class="node-blink-3" />
                    <line x1="23" y1="17" x2="28.5" y2="11.5" stroke="#7000ff" stroke-width="0.7" opacity="0.45" />
                    <line x1="17" y1="23" x2="11.5" y2="28.5" stroke="#7000ff" stroke-width="0.7" opacity="0.45" />
                </svg>
            </div>
        </div>

        <div class="brand-title">AV4X04</div>
        <div class="brand-sub">// Secure Monitor System</div>

        <div class="card">
            <div class="form-header">
                <div class="status-dot"></div>
                <i class="ph ph-lock-key"></i>
                SECURE ACCESS REQUIRED
            </div>

            <form id="loginForm">
                <div class="field">
                    <div class="field-label"><i class="ph ph-user"></i> Username</div>
                    <div class="input-wrap">
                        <i class="ph ph-user-circle input-icon"></i>
                        <input type="text" id="username" placeholder="admin" autocomplete="off" required />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label"><i class="ph ph-key"></i> Password</div>
                    <div class="input-wrap">
                        <i class="ph ph-lock-simple input-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required />
                        <button type="button" class="toggle-pw" id="togglePw">
                            <i class="ph ph-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <i class="ph ph-sign-in"></i>
                    ACCESS SYSTEM
                </button>

                <div class="error-msg" id="errMsg">
                    <i class="ph ph-warning"></i>
                    <span id="errText">Invalid credentials</span>
                </div>
            </form>

            <div class="hero-stats">
                <div class="stat-item"><i class="ph ph-shield-check"></i> JWT Secured</div>
                <div class="stat-divider"></div>
                <div class="stat-item"><i class="ph ph-activity"></i> Real-time</div>
                <div class="stat-divider"></div>
                <div class="stat-item"><i class="ph ph-trend-up"></i> Live Monitor</div>
            </div>
        </div>

        <div class="card-footer">AV4X04 &copy; 2026 &mdash; CLASSIFIED</div>
    </div>

    <script>
        // ── Three.js background (spinning circuit cube + particles) ──
        (function () {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0b0f19, 0.002);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const p1 = new THREE.PointLight(0x00f2ff, 1.2, 100);
            p1.position.set(10, 10, 10); scene.add(p1);
            const p2 = new THREE.PointLight(0x7000ff, 1, 100);
            p2.position.set(-10, -10, 10); scene.add(p2);

            // Circuit texture
            function makeCircuitTex() {
                const sz = 512, cv = document.createElement('canvas');
                cv.width = cv.height = sz;
                const ctx = cv.getContext('2d');
                ctx.fillStyle = '#000'; ctx.fillRect(0, 0, sz, sz);
                ctx.strokeStyle = 'rgba(0,242,255,0.08)'; ctx.lineWidth = 1;
                for (let i = 0; i < sz; i += 48) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, sz); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(sz, i); ctx.stroke();
                }
                ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2;
                ctx.shadowBlur = 8; ctx.shadowColor = '#00f2ff';
                for (let i = 0; i < 30; i++) {
                    const x = Math.floor(Math.random() * (sz / 48)) * 48;
                    const y = Math.floor(Math.random() * (sz / 48)) * 48;
                    const len = Math.random() * 150 + 40;
                    ctx.beginPath(); ctx.moveTo(x, y);
                    Math.random() > 0.5 ? ctx.lineTo(x + len, y) : ctx.lineTo(x, y + len);
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(0,242,255,0.7)';
                    ctx.fillRect(x - 3, y - 3, 6, 6);
                }
                ctx.fillStyle = 'rgba(0,40,60,0.8)'; ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 3;
                ctx.fillRect(sz / 2 - 70, sz / 2 - 70, 140, 140);
                ctx.strokeRect(sz / 2 - 70, sz / 2 - 70, 140, 140);
                return new THREE.CanvasTexture(cv);
            }

            const tex = makeCircuitTex();
            const cube = new THREE.Mesh(
                new THREE.BoxGeometry(2.5, 2.5, 2.5),
                new THREE.MeshStandardMaterial({ map: tex, emissive: 0x004455, emissiveMap: tex, emissiveIntensity: 0.9, roughness: 0.2, metalness: 0.8, transparent: true, opacity: 0.9 })
            );
            scene.add(cube);

            const cage = new THREE.Mesh(
                new THREE.BoxGeometry(2.9, 2.9, 2.9),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.12 })
            );
            scene.add(cage);

            // Shooting stars / streaks
            const streakGeo = new THREE.BufferGeometry();
            const streakPts = new Float32Array(60 * 3);
            for (let i = 0; i < 60 * 3; i++) streakPts[i] = (Math.random() - 0.5) * 30;
            streakGeo.setAttribute('position', new THREE.BufferAttribute(streakPts, 3));
            const streaks = new THREE.Points(streakGeo, new THREE.PointsMaterial({
                size: 0.08, color: 0xffffff, transparent: true, opacity: 0.6,
                blending: THREE.AdditiveBlending
            }));
            scene.add(streaks);

            // Particles
            const pgeo = new THREE.BufferGeometry();
            const pts = new Float32Array(1000 * 3);
            for (let i = 0; i < 1000 * 3; i++) pts[i] = (Math.random() - 0.5) * 22;
            pgeo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
            const particles = new THREE.Points(pgeo, new THREE.PointsMaterial({
                size: 0.04, color: 0x00f2ff, transparent: true, opacity: 0.35,
                blending: THREE.AdditiveBlending
            }));
            scene.add(particles);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            (function animate() {
                requestAnimationFrame(animate);
                const t = Date.now() * 0.0005;
                cube.rotation.x += 0.0014; cube.rotation.y += 0.0019;
                cage.rotation.x += 0.0009; cage.rotation.y += 0.0013;
                // Occasional flicker of stars
                streaks.material.opacity = 0.4 + 0.3 * Math.abs(Math.sin(t * 2.3));
                particles.rotation.y = t * 0.04;
                renderer.render(scene, camera);
            })();
        })();

        // ── Login logic ──
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errMsg = document.getElementById('errMsg');
        const errText = document.getElementById('errText');
        const togglePw = document.getElementById('togglePw');
        const toggleIcon = document.getElementById('toggleIcon');
        const pwInput = document.getElementById('password');

        togglePw.addEventListener('click', () => {
            const show = pwInput.type === 'password';
            pwInput.type = show ? 'text' : 'password';
            toggleIcon.className = show ? 'ph ph-eye-slash' : 'ph ph-eye';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errMsg.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="ph ph-circle-notch" style="animation:spin 0.8s linear infinite"></i> AUTHENTICATING...';

            const username = document.getElementById('username').value.trim();
            const password = pwInput.value;

            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('hk_token', data.token);
                    localStorage.setItem('hk_user', data.username || username);
                    submitBtn.innerHTML = '<i class="ph ph-check-circle"></i> ACCESS GRANTED';
                    submitBtn.style.background = 'linear-gradient(135deg,#065f46,#00ff9d)';
                    setTimeout(() => { window.location.href = '/dashboard'; }, 600);
                } else {
                    errText.textContent = data.message || 'Invalid credentials';
                    errMsg.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="ph ph-sign-in"></i> ACCESS SYSTEM';
                }
            } catch {
                errText.textContent = 'Server unreachable';
                errMsg.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="ph ph-sign-in"></i> ACCESS SYSTEM';
            }
        });
    </script>
    <style>
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
